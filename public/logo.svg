<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient -->
    <linearGradient id="gradMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>

    <!-- Mask -->
    <mask id="cutGrid">
      <rect width="60" height="60" fill="white"/>
      <g stroke="black" stroke-width="6" stroke-linecap="square">
        <!-- Top (≈ 1/4) -->
        <line x1="10" y1="-5" x2="65" y2="50" />
        <!-- Center -->
        <line x1="0" y1="0" x2="60" y2="60" />
        <!-- Bottom (≈ 3/4) -->
        <line x1="-5" y1="10" x2="50" y2="65" />
      </g>
    </mask>
  </defs>

  <!-- Circle -->
  <g mask="url(#cutGrid)">
    <circle cx="30" cy="30" r="30" fill="url(#gradMain)" />
  </g>
</svg>